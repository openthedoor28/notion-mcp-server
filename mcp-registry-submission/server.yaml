name: notion-mcp-awkoy
image: mcp/notion-mcp-awkoy
type: server
meta:
  category: productivity
  tags:
    - notion
    - productivity
    - batch
title: Notion (community, batch ops)
icon: https://avatars.githubusercontent.com/u/4792552?s=200&v=4
description: |
  Community Notion MCP server with batch block operations, consolidated
  per-resource tool schemas (pages, blocks, databases, comments, users),
  and a pluggable auth gateway (Personal Access Token or Internal
  Integration). Alternative to the official Notion MCP server for
  workflows that prefer fewer, more powerful tools and a single
  round-trip for multi-block edits.
source:
  project: https://github.com/awkoy/notion-mcp-server
config:
  description: |
    Configure `NOTION_TOKEN` with a Notion Personal Access Token
    (`ntn_...`) or an Internal Integration Secret. `NOTION_PAGE_ID`
    is optional — set it to a default parent page used by
    `create_page` / `create_database` when no parent is passed.
  secrets:
    - name: notion.token
      env: NOTION_TOKEN
      example: ntn_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  env:
    - name: NOTION_PAGE_ID
      example: 8a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d
      value: "{{notion-mcp-awkoy.notion_page_id}}"
  parameters:
    type: object
    properties:
      notion_page_id:
        type: string
        description: Default parent page ID used when none is passed at call time.
